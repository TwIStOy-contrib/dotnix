name: Dependabot Rebase

on:
  push:
    branches:
      - master

jobs:
  rebase:
    name: Update dependabot PR branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Update all open dependabot PR branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            for (const pull of pulls) {
              if (pull.user.login !== 'dependabot[bot]') {
                continue;
              }

              core.info(`Updating branch for PR #${pull.number}: ${pull.title}`);
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pull.number,
                });
                core.info(`Successfully updated PR #${pull.number}`);
              } catch (err) {
                if (err.status === 422) {
                  core.info(`PR #${pull.number} is already up to date`);
                } else {
                  core.warning(`Failed to update PR #${pull.number}: ${err.message}`);
                }
              }
            }
