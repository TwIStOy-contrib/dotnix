name: Dependabot Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  automerge:
    name: Auto-merge dependabot PR
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge dependabot PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const headBranch = context.payload.workflow_run.head_branch;
            const headSha = context.payload.workflow_run.head_sha;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${headBranch}`,
            });

            for (const pr of prs) {
              if (pr.user.login !== 'dependabot[bot]') {
                core.info(`PR #${pr.number} is not from dependabot, skipping`);
                continue;
              }
              if (pr.head.sha !== headSha) {
                core.info(`PR #${pr.number} head SHA mismatch, skipping`);
                continue;
              }
              core.info(`Merging dependabot PR #${pr.number}: ${pr.title}`);
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                });
                core.info(`Successfully merged PR #${pr.number}`);
              } catch (err) {
                core.setFailed(`Failed to merge PR #${pr.number}: ${err.message}`);
              }
            }
